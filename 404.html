<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- TODO: 本番公開時にnoindex,nofollowを削除 -->
  <meta name="robots" content="noindex,nofollow">
  <title>ページが見つかりません ─ 株式会社八宝</title>
  <meta name="description" content="お探しのページは見つかりませんでした。株式会社八宝のトップページからご覧ください。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;600&display=swap">

  <style>
    :root {
      --ink: #1a1814;
      --ink-soft: #3a3631;
      --muted: #8a857a;
      --paper-soft: #faf8f3;
      --gold: #c9a24b;
      --gold-soft: #b48d40;
      --mincho: "Shippori Mincho", "YuMincho", "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
      --cormorant: "Cormorant Garamond", "Times New Roman", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--mincho); background: var(--paper-soft); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }
    .wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 24px; }
    .logo { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 56px; }
    .logo .mark { width: 56px; height: 56px; border: 1.4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff; }
    .logo .mark svg { width: 30px; height: 30px; }
    .logo .name { display: flex; flex-direction: column; line-height: 1; gap: 5px; }
    .logo .name .ja { display: flex; align-items: baseline; gap: 10px; }
    .logo .name .small { font-size: 12px; letter-spacing: 0.18em; }
    .logo .name .big { font-size: 22px; letter-spacing: 0.2em; font-weight: 500; }
    .logo .name .en { font-size: 10px; letter-spacing: 0.45em; color: var(--gold-soft); font-family: var(--cormorant); }
    .code { font-family: var(--cormorant); font-size: clamp(80px, 14vw, 140px); font-weight: 500; color: var(--gold-soft); letter-spacing: 0.05em; line-height: 1; margin: 0 0 20px; }
    h1 { font-family: var(--mincho); font-weight: 500; font-size: clamp(22px, 2.6vw, 30px); letter-spacing: 0.16em; margin: 0 0 18px; }
    .lead { font-family: var(--mincho); color: var(--ink-soft); font-size: 15px; line-height: 2; letter-spacing: 0.08em; max-width: 520px; margin: 0 0 40px; }
    .home { display: inline-flex; align-items: center; gap: 14px; padding: 18px 36px; background: var(--ink); color: #fff; font-family: var(--mincho); font-size: 14.5px; letter-spacing: 0.2em; min-height: 56px; transition: background .25s ease, transform .25s ease; }
    .home:hover { background: var(--gold-soft); transform: translateY(-2px); }
    footer { padding: 24px; text-align: center; font-family: "Noto Sans JP", sans-serif; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); border-top: 1px solid #d9d4c8; background: #fff; }
  
  /* === Logo mark: use new brand image (no circle border) === */
  .logo .mark {
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    width: 52px !important;
    height: 52px !important;
  }
  .logo .mark img {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    display: block !important;
  }
</style>

  <!-- Favicons -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="photos/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="photos/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="photos/brand/apple-touch-icon.png">
</head>
<body>
  <main class="wrap">
    <a href="./" class="logo" aria-label="株式会社八宝 HAPPO トップへ">
      <span class="mark" aria-hidden="true">
        <img src="photos/brand/happou-mark.png" alt="" width="48" height="48" style="width:100%;height:100%;object-fit:contain;display:block;">
      </span>
      <span class="name">
        <span class="ja"><span class="small">株式会社</span><span class="big">八宝</span></span>
        <span class="en">— HAPPO —</span>
      </span>
    </a>
    <p class="code" aria-hidden="true">404</p>
    <h1>ページが見つかりません</h1>
    <p class="lead">お探しのページは移動または削除された可能性があります。<br>お手数ですが、トップページからお探しください。</p>
    <a href="./" class="home"><span>トップページへ戻る</span><span aria-hidden="true">→</span></a>
  </main>
  <footer>© 2026 株式会社八宝　HAPPO Co., Ltd.</footer>
</body>
</html>
